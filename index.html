<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 蓝牙搜索测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #007aff;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active {
            background-color: #0056b3;
        }
        .log-box {
            margin-top: 20px;
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        .error { color: #ff6b6b; }
        .success { color: #a6e22e; }
        .info { color: #66d9ef; }
    </style>
</head>
<body>

<div class="container">
    <h2>Web Bluetooth 搜索测试</h2>
    <p style="font-size: 14px; color: #666;">提示：请确保在 HTTPS 环境下打开，并使用支持 Web BLE 的浏览器（如 iOS 上的 Bluefy）。</p>
    
    <!-- 触发蓝牙搜索的按钮 -->
    <button id="scanBtn">开始搜索蓝牙设备</button>

    <!-- 用于显示调试日志的区域 -->
    <div class="log-box" id="logBox">
        <span class="info">[系统] 等待点击按钮开始搜索...</span><br>
    </div>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const logBox = document.getElementById('logBox');

    // 封装一个打印日志的函数
    function log(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const span = document.createElement('span');
        span.className = type;
        span.innerHTML = `[${time}] ${message}<br>`;
        logBox.appendChild(span);
        logBox.scrollTop = logBox.scrollHeight; // 滚动条自动滚到底部
    }

    // 按钮点击事件
    scanBtn.addEventListener('click', async () => {
        log('正在检查浏览器蓝牙支持情况...', 'info');

        // 1. 检查浏览器是否支持蓝牙 API
        if (!navigator.bluetooth) {
            log('错误：当前浏览器或环境不支持 Web Bluetooth API！请检查是否使用了 HTTPS，或者是否更换了支持的浏览器（如 Bluefy）。', 'error');
            return;
        }

        log('正在调起系统蓝牙搜索框...', 'info');

        try {
            // 2. 发起蓝牙设备请求
            // acceptAllDevices: true 表示搜索附近所有蓝牙设备
            // optionalServices: 如果你后续要连接获取数据，需要在这里填写设备支持的 Service UUID（比如 ['battery_service']）
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true
                // 如果只想搜特定名字的设备，可以换成下面这种写法：
                // filters: [{ namePrefix: 'MyDevice' }] 
            });

            // 3. 用户在系统弹窗中选择设备并配对成功
            log(`成功选择设备！`, 'success');
            log(`设备名称 (Name): ${device.name || '未知名称'}`, 'success');
            log(`设备ID (ID): ${device.id}`, 'success');
            
            // 这里可以继续监听设备断开事件
            device.addEventListener('gattserverdisconnected', () => {
                log('提示：蓝牙设备已断开连接。', 'error');
            });

        } catch (error) {
            // 4. 捕获用户取消或搜索失败的错误
            if (error.name === 'NotFoundError') {
                log('用户取消了蓝牙搜索，或未选择任何设备。', 'error');
            } else {
                log(`搜索失败: ${error.message}`, 'error');
                console.error(error);
            }
        }
    });
</script>

</body>
</html>
